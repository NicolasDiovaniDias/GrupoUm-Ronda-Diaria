<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Empresas</title>

        <style>

            body {
                font-family: Arial, sans-serif;
                padding: 30px;
                background: #f5f5f5;
            }

            h1 {
                margin-bottom: 20px;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                background: white;
            }

            th,
            td {
                padding: 12px;
                border: 1px solid #ddd;
                text-align: left;
            }

            th {
                background: #333;
                color: white;
            }

            tr:nth-child(even) {
                background: #f9f9f9;
            }

            .busca-container {
                margin-bottom: 20px;
                max-width: 500px;
            }

            .busca-container label {
                display: block;
                margin-bottom: 8px;
                font-weight: bold;
                color: #333;
            }

            .busca-container input {
                width: 100%;
                padding: 12px 14px;
                border: 1px solid #ccc;
                border-radius: 6px;
                font-size: 15px;
                box-sizing: border-box;
            }

            .busca-container input:focus {
                outline: none;
                border-color: #333;
            }
        </style>
    </head>
    <body>

        <h1>Empresas Cadastradas</h1>

        <p>
            <a href="index.html">Cadastrar nova empresa</a>
        </p>

        <div class="busca-container">
            <input type="text" id="campoBusca" placeholder="Buscar empresa por nome, bolsa, país ou ramo...">
        </div>

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Bolsa</th>
                    <th>País</th>
                    <th>Ramo</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabelaEmpresas">
                <!-- empresas serão inseridas aqui -->
            </tbody>

        </table>

        <script src="../js/modal.js"></script>

        <script>

            // Armazena todas as empresas carregadas da API.
            // Essa variável será utilizada para realizar os filtros de busca.
            let empresasCarregadas = [];

            // Função responsável por buscar as empresas na API.
            async function carregarEmpresas() {

                try {

                    // Faz requisição GET para a API.
                    const resposta = await fetch('http://localhost:3000/empresas');

                    // Converte resposta para JSON.
                    const dados = await resposta.json();

                    // Armazena as empresas carregadas para uso posterior nos filtros.
                    empresasCarregadas = dados.empresas;

                    // Renderiza a tabela com todas as empresas.
                    renderizarTabela(empresasCarregadas);

                } catch (erro) {

                    console.error('Erro ao carregar empresas:', erro);

                    mostrarModal('Erro ao carregar empresas.');
                }
            }

            // Função responsável por montar a tabela de empresas.
            function renderizarTabela(empresas) {

                // Seleciona tbody da tabela.
                const tabela = document.getElementById('tabelaEmpresas');

                // Limpa conteúdo atual da tabela.
                tabela.innerHTML = '';

                // Exibe mensagem caso nenhuma empresa seja encontrada.
                if (empresas.length === 0) {

                    tabela.innerHTML = `
                        <tr>
                            <td colspan="6">Nenhuma empresa encontrada.</td>
                        </tr>
                    `;

                    return;
                }

                // Percorre lista de empresas.
                empresas.forEach((empresa) => {

                    // Cria linha da tabela.
                    const linha = document.createElement('tr');

                    // Define conteúdo HTML da linha.
                    linha.innerHTML = `
                        <td>${empresa.id_empresa}</td>
                        <td>${empresa.nome}</td>
                        <td>${empresa.bolsa || '-'}</td>
                        <td>${empresa.pais || '-'}</td>
                        <td>${empresa.ramo || '-'}</td>
                        <td>
                            <a href="detalhes.html?id=${empresa.id_empresa}">
                                Ver detalhes
                            </a>

                            |

                            <a href="editar.html?id=${empresa.id_empresa}">
                                Editar
                            </a>
                        </td>
                    `;

                    // Adiciona linha na tabela.
                    tabela.appendChild(linha);
                });
            }

            // Monitora alterações no campo de busca.
            document.getElementById('campoBusca').addEventListener('input', function () {

                // Recupera texto digitado pelo usuário.
                const termoBusca = this.value.toLowerCase().trim();

                // Filtra empresas com base no termo informado.
                const empresasFiltradas = empresasCarregadas.filter((empresa) => {

                    return (
                        empresa.nome.toLowerCase().includes(termoBusca) ||
                        (empresa.bolsa || '').toLowerCase().includes(termoBusca) ||
                        (empresa.pais || '').toLowerCase().includes(termoBusca) ||
                        (empresa.ramo || '').toLowerCase().includes(termoBusca)
                    );
                });

                // Atualiza tabela com os resultados encontrados.
                renderizarTabela(empresasFiltradas);
            });

            // Executa função ao abrir página.
            carregarEmpresas();

        </script>

    </body>
</html>
