<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Empresas</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #333;
            color: white;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

    </style>
</head>
<body>

    <h1>Empresas Cadastradas</h1>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Bolsa</th>
                <th>País</th>
                <th>Ramo</th>
            </tr>
        </thead>

        <tbody id="tabelaEmpresas">
            <!-- empresas serão inseridas aqui -->
        </tbody>

    </table>


    <script>

        // Função responsável por buscar as empresas na API.
        async function carregarEmpresas() {

            try {

                // Faz requisição GET para a API.
                const resposta = await fetch('http://localhost:3000/empresas');

                // Converte resposta para JSON.
                const dados = await resposta.json();

                // Seleciona tbody da tabela.
                const tabela = document.getElementById('tabelaEmpresas');

                // Limpa tabela antes de renderizar novamente.
                tabela.innerHTML = '';

                // Percorre lista de empresas.
                dados.empresas.forEach((empresa) => {

                    // Cria linha da tabela.
                    const linha = document.createElement('tr');

                    // Define conteúdo HTML da linha.
                    linha.innerHTML = `
                        <td>${empresa.id_empresa}</td>
                        <td>${empresa.nome}</td>
                        <td>${empresa.bolsa || '-'}</td>
                        <td>${empresa.pais || '-'}</td>
                        <td>${empresa.ramo || '-'}</td>
                    `;

                    // Adiciona linha na tabela.
                    tabela.appendChild(linha);
                });

            } catch (erro) {

                console.error('Erro ao carregar empresas:', erro);

                alert('Erro ao carregar empresas.');
            }
        }

        // Executa função ao abrir página.
        carregarEmpresas();

    </script>

</body>
</html>
