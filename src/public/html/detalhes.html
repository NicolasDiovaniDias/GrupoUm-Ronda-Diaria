<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Empresa</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <main>
        <section>
            <h1>Detalhes da Empresa</h1>

            <div id="dadosEmpresa">
                <p>Carregando dados...</p>
            </div>

            <hr>

            <h2>Nomes associados</h2>
            <ul id="listaNomes"></ul>

            <h2>Termos associados</h2>
            <ul id="listaTermos"></ul>

            <h2>Concorrentes</h2>
            <ul id="listaConcorrentes"></ul>

            <br>

            <a href="lista.html">Voltar para listagem</a>

            <button type="button" id="btnExcluirEmpresa">
                Excluir empresa
            </button>
        </section>
    </main>

    <script src="../js/modal.js"></script>

    <script>

        // Recupera o ID da empresa informado na URL.
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        // ===============================================
        // CARREGAR EMPRESA
        // ===============================================
        async function carregarDetalhesEmpresa() {

            if (!id) {
                mostrarModal('ID da empresa não informado.');
                return;
            }

            try {
                const resposta = await fetch(`http://localhost:3000/empresas/${id}`);
                const dados = await resposta.json();

                if (!dados.sucesso) {
                    mostrarModal(dados.mensagem || 'Erro ao carregar empresa.');
                    return;
                }

                const empresa = dados.empresa;

                document.getElementById('dadosEmpresa').innerHTML = `
                    <p><strong>ID:</strong> ${empresa.id_empresa}</p>
                    <p><strong>Nome:</strong> ${empresa.nome}</p>
                    <p><strong>Bolsa:</strong> ${empresa.bolsa || '-'}</p>
                    <p><strong>País:</strong> ${empresa.pais || '-'}</p>
                    <p><strong>Ramo:</strong> ${empresa.ramo || '-'}</p>
                `;

                preencherLista('listaNomes', dados.nomes);
                preencherLista('listaTermos', dados.termos);
                preencherLista('listaConcorrentes', dados.concorrentes);

            } catch (erro) {
                console.error('Erro:', erro);
                mostrarModal('Erro ao conectar com o servidor.');
            }
        }

        function preencherLista(idElemento, itens) {
            const lista = document.getElementById(idElemento);
            lista.innerHTML = '';

            if (!itens || itens.length === 0) {
                lista.innerHTML = '<li>Nenhum registro encontrado.</li>';
                return;
            }

            itens.forEach((item) => {
                const li = document.createElement('li');
                li.textContent = item.nome;
                lista.appendChild(li);
            });
        }

        // ===============================================
        // EXCLUIR EMPRESA
        // ===============================================
        document.getElementById('btnExcluirEmpresa').addEventListener('click', async function () {
            const confirmar = confirmarModal('Tem certeza que deseja excluir esta empresa? Essa ação não poderá ser desfeita.');

            if (!confirmar) {
                return;
            }

            try {
                const resposta = await fetch(`http://localhost:3000/empresas/${id}`, {
                    method: 'DELETE'
                });

                const resultado = await resposta.json();

                if (resultado.sucesso) {
                    mostrarModal('Empresa excluída com sucesso!');
                    window.location.href = 'lista.html';
                } else {
                    mostrarModal(resultado.mensagem || 'Erro ao excluir empresa.');
                }

            } catch (erro) {
                console.error('Erro:', erro);
                mostrarModal('Erro ao conectar com o servidor.');
            }
        });

        // Inicializa a tela.
        carregarDetalhesEmpresa();
    </script>

</body>
</html>
