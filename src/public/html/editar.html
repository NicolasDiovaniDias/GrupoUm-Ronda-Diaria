<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Editar Empresa</title>
        <link rel="stylesheet" href="../css/style.css">
    </head>

    <body>
        <main>
            <article>
                <section>
                    <h1>Editar Empresa</h1>

                    <p>
                        <a href="lista.html">Voltar para lista</a>
                    </p>

                    <form id="formEditarEmpresa">
                        <input type="text" name="empresaNome" placeholder="Nome da empresa">
                        <input type="text" name="empresaBolsa" placeholder="Ação na bolsa">
                        <input type="text" name="empresaPais" placeholder="País da empresa">
                        <input type="text" name="empresaRamo" placeholder="Ramo">

                        <div class="input-group">
                            <input type="text" id="nomeInput" placeholder="Ex: Renner SA">
                            <button type="button" onclick="adicionarNome()">Adicionar</button>
                        </div>

                        <div id="listaNomes" class="chip-list"></div>

                        <div class="input-group">
                            <input type="text" id="termoInput" placeholder="Ex: Calçados, Roupas, etc.">
                            <button type="button" onclick="adicionarTermo()">Adicionar</button>
                        </div>

                        <div id="listaTermos" class="chip-list"></div>

                        <input type="text" name="empresaConcorrente" placeholder="Concorrente">

                        <button type="submit" id="button-submit">Salvar alterações</button>
                    </form>
                </section>
            </article>
        </main>

        <script src="../js/modal.js"></script>

        <script>
            function adicionarNome(valorInicial = '') {
                const input = document.getElementById('nomeInput');
                const valor = valorInicial || input.value.trim();
                const lista = document.getElementById('listaNomes');

                if (valor === '') return;

                const chip = document.createElement('div');
                chip.className = 'chip';

                chip.innerHTML = `
                    ${valor}
                    <button class="btn-remove" type="button" onclick="this.parentElement.remove()">x</button>
                    <input type="hidden" name="nomes[]" value="${valor}">
                `;

                lista.appendChild(chip);

                input.value = '';
                input.focus();
            }

            function adicionarTermo(valorInicial = '') {
                const input = document.getElementById('termoInput');
                const valor = valorInicial || input.value.trim();
                const lista = document.getElementById('listaTermos');

                if (valor === '') return;

                const chip = document.createElement('div');
                chip.className = 'chip';

                chip.innerHTML = `
                    ${valor}
                    <button class="btn-remove" type="button" onclick="this.parentElement.remove()">x</button>
                    <input type="hidden" name="termos[]" value="${valor}">
                `;

                lista.appendChild(chip);

                input.value = '';
                input.focus();
            }

            document.getElementById('nomeInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    adicionarNome();
                }
            });

            document.getElementById('termoInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    adicionarTermo();
                }
            });

            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            async function carregarEmpresa() {
                if (!id) {
                    mostrarModal('ID da empresa não informado.');
                    return;
                }

                try {
                    const resposta = await fetch(`http://localhost:3000/empresas/${id}`);
                    const dados = await resposta.json();

                    if (!dados.sucesso) {
                        mostrarModal(dados.mensagem || 'Erro ao carregar empresa.');
                        return;
                    }

                    const empresa = dados.empresa;
                    const form = document.getElementById('formEditarEmpresa');

                    form.empresaNome.value = empresa.nome || '';
                    form.empresaBolsa.value = empresa.bolsa || '';
                    form.empresaPais.value = empresa.pais || '';
                    form.empresaRamo.value = empresa.ramo || '';

                    if (Array.isArray(dados.nomes)) {
                        dados.nomes.forEach((item) => {
                            adicionarNome(item.nome);
                        });
                    }

                    if (Array.isArray(dados.termos)) {
                        dados.termos.forEach((item) => {
                            adicionarTermo(item.nome);
                        });
                    }

                    if (Array.isArray(dados.concorrentes) && dados.concorrentes.length > 0) {
                        form.empresaConcorrente.value = dados.concorrentes[0].nome || '';
                    }

                } catch (erro) {
                    console.error('Erro:', erro);
                    mostrarModal('Erro ao carregar dados da empresa.');
                }
            }

            document.getElementById('formEditarEmpresa').addEventListener('submit', async function (e) {
                e.preventDefault();

                const form = e.target;

                const nomes = Array.from(document.querySelectorAll('input[name="nomes[]"]'))
                    .map(input => input.value);

                const termos = Array.from(document.querySelectorAll('input[name="termos[]"]'))
                    .map(input => input.value);

                const dados = {
                    nome: form.empresaNome.value.trim(),
                    bolsa: form.empresaBolsa.value.trim(),
                    pais: form.empresaPais.value.trim(),
                    ramo: form.empresaRamo.value.trim(),
                    concorrente: form.empresaConcorrente.value.trim(),
                    nomes,
                    termos
                };

                try {
                    const resposta = await fetch(`http://localhost:3000/empresas/${id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(dados)
                    });

                    const resultado = await resposta.json();

                    if (resultado.sucesso) {
                        mostrarModal('Empresa atualizada com sucesso!', function () {
                            window.location.href = `detalhes.html?id=${id}`;
                        });
                    } else {
                        mostrarModal(resultado.mensagem || 'Erro ao atualizar empresa.');
                    }

                } catch (erro) {
                    console.error('Erro:', erro);
                    mostrarModal('Erro ao conectar com o servidor.');
                }
            });

            carregarEmpresa();
        </script>
    </body>
</html>
