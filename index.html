<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronda Diária</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <article>
            <section>
                <h1>Empresa</h1>
                <form id="formEmpresa" method="post">
                    <input type="text" name="empresaNome" placeholder="Nome da empresa">
                    <input type="text" name="empresaBolsa" placeholder="Ação na bolsa">
                    <input type="text" name="empresaPais" placeholder="País da empresa">
                    <input type="text" name="empresaRamo" placeholder="Ramo">

                    <div class="input-group">
                        <input type="text" id="nomeInput" placeholder="Ex: Renner SA">

                        <button type="button" onclick="adicionarNome()">Adicionar</button>
                    </div>
                    <div id="listaNomes" class="chip-list">
                    </div>
                    <div class="input-group">
                        <input type="text" id="termoInput" placeholder="Ex: Calçados, Roupas, etc.">
                        <button type="button" onclick="adicionarTermo()">Adicionar</button>
                    </div>
                    <div id="listaTermos" class="chip-list">
                    </div>
                    <input type="text" name="empresaConcorrente" placeholder="Concorrentes">
                    <button type="submit" id="button-submit">Enviar</button>
                </form>
            </section>
        </article>
    </main>
</body>
<script>
    function adicionarNome() {
        const input = document.getElementById('nomeInput');
        const valor = input.value.trim();
        const lista = document.getElementById('listaNomes');

        if (valor === "") return;
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.innerHTML = `
                ${valor}
                <button class="btn-remove" onclick="this.parentElement.remove()">x</button>
                <input type="hidden" name="nomes[]" value="${valor}">
            `;

        lista.appendChild(chip);
        input.value = "";
        input.focus();
    }

    document.getElementById('nomeInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            adicionarNome();
        }
    });

    function adicionarTermo() {
        const input = document.getElementById('termoInput');
        const valor = input.value.trim();
        const lista = document.getElementById('listaTermos');

        if (valor === "") return;
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.innerHTML = `
                ${valor}
                <button class="btn-remove" onclick="this.parentElement.remove()">x</button>
                <input type="hidden" name="termos[]" value="${valor}">
            `;

        lista.appendChild(chip);
        input.value = "";
        input.focus();
    }

    document.getElementById('termoInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            adicionarTermo();
        }
    });

    document.getElementById('formEmpresa').addEventListener('submit', async function (e) {
        e.preventDefault();

        const form = e.target;

        const nomes = Array.from(document.querySelectorAll('input[name="nomes[]"]'))
            .map(input => input.value);

        const termos = Array.from(document.querySelectorAll('input[name="termos[]"]'))
            .map(input => input.value);

        const dados = {
            nome: form.empresaNome.value.trim(),
            bolsa: form.empresaBolsa.value.trim(),
            pais: form.empresaPais.value.trim(),
            ramo: form.empresaRamo.value.trim(),
            concorrente: form.empresaConcorrente.value.trim(),
            nomes: nomes,
            termos: termos
        };

        try {
            const resposta = await fetch('http://localhost:3000/empresas', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dados)
            });

            const resultado = await resposta.json();

            if (resultado.sucesso) {
                alert('Empresa cadastrada com sucesso!');

                form.reset();
                document.getElementById('listaNomes').innerHTML = '';
                document.getElementById('listaTermos').innerHTML = '';
            } else {
                alert(resultado.mensagem || 'Erro ao cadastrar empresa.');
            }

        } catch (erro) {
            console.error('Erro:', erro);
            alert('Erro ao conectar com o servidor.');
        }
    });
</script>

</html>
