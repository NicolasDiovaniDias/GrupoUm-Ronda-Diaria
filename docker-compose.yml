services:
  app:
    build: .
    container_name: ronda_diaria_app

    ports:
      - "3000:3000"

    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: ronda_diaria

    volumes:
      - .:/app
      - /app/node_modules

    command: node src/server.js

  mysql:
    image: mysql:8.0

    container_name: ronda_diaria_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ronda_diaria

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  mysql_data: