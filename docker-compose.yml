services:
  app:
    build: .
    container_name: ronda_diaria_app

    ports:
      - "3000:3000"

    depends_on:
      - mysql

    volumes:
      - .:/app
      - /app/node_modules

    command: node src/server.js

  mysql:
    image: mysql:8.0

    container_name: ronda_diaria_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ronda_diaria

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  mysql_data: