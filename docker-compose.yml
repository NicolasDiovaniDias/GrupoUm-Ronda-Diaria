version: '3.8'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      PGHOST: postgres
      PGUSER: myuser
      PGPASSWORD: mypassword
      PGDATABASE: mydb
      PGPORT: "5432"
      NODE_ENV: production
    depends_on:
      - postgres

  postgres:
    image: postgres:18

    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - pgdata:/var/lib/postgresql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

volumes:
  pgdata: